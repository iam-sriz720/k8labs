apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-deployment
  labels:
    app: my-app
    key: front-end
spec:
  replicas: 3
  selector:
    matchLabels:
      app: my-app
      key: front-end
  template:
    metadata:
      labels:
        app: my-app
        key: front-end
    spec:
      containers:
      - name: web01
        image: nginx:latest
        ports:
        - containerPort: 80